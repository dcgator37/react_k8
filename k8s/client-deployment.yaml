apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      component: web
      version: stable
  template:
    metadata:
      labels:
        component: web
        version: stable
    spec:
      containers:
        - name: client
          image: dcgator8/todo-client_k8
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"