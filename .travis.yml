sudo: required
dist: jammy
services:
  - docker
env:
  global:
    - SHA=$(git rev-parse HEAD)
    - CLOUDSDK_CORE_DISABLE_PROMPTS=1
before_install:
  - openssl aes-256-cbc -K $encrypted_9f3b5599b056_key -iv $encrypted_9f3b5599b056_iv -in service-account.json.enc -out service-account.json -d
  - sudo apt-get update
  - sudo apt-get install -y python3
  - python3 --version
  - export CLOUDSDK_PYTHON=/usr/bin/python3
  - curl https://sdk.cloud.google.com | bash > /dev/null;
  - source $HOME/google-cloud-sdk/path.bash.inc
  - gcloud components update kubectl
  - gcloud auth activate-service-account --key-file service-account.json
  - gcloud config set project multi-k8s-494912
  - gcloud config set compute/region us-central1
  - gcloud container clusters get-credentials multi-k8s
  - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
  - docker build -t dcgator8/react-test -f ./client/Dockerfile.dev ./client

script:
  - docker run -e CI=true dcgator8/react-test npm test

deploy:
  provider: script
  script: bash ./deploy.sh
  on:
    branch: master